name: CI

on:
  push:
    branches:
      - main
      - dev/*
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAR_DIR: build/libs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew --no-daemon clean build

      - name: Verify JAR output
        shell: bash
        run: |
          shopt -s nullglob
          jars=($JAR_DIR/*.jar)
          if [ ${#jars[@]} -eq 0 ]; then
            echo "No jar files found in $JAR_DIR"
            exit 1
          fi
          echo "Found ${#jars[@]} jar file(s):"
          ls -lh "$JAR_DIR"
